openapi: 3.0.3
info:
  title: Phlex Hub — Auth API
  version: 0.2.0
  description: |
    JSON authentication surface for `phlex-hub`. Mirrors the SSR form
    endpoints (`/signup`, `/login`, `/logout`) for clients that need to
    integrate programmatically. All endpoints round-trip through
    `Phlex\Shared\Auth\JwtClaims` — the same DTO `phlex-server` will use
    to validate hub-minted tokens starting in Phase C.

servers:
  - url: http://localhost:8800
    description: Local development

paths:
  /api/v1/auth/signup:
    post:
      summary: Create a new hub account.
      description: |
        Creates a new user, returns access + refresh JWTs, and sets the
        same JWTs as session cookies for browser clients.

        The very first user to call this endpoint on a fresh deployment
        is auto-promoted to admin (see `docs/dev/architecture-hub.md`).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation failure (bad email, short password, duplicate username/email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      summary: Authenticate with credentials and receive tokens.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Clear the current session cookies.
      description: |
        B.7 implements client-side logout only — the refresh token is
        NOT revoked server-side. Use this endpoint to clear cookies
        and audit-log the logout event.
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout recorded; cookies cleared.

  /api/v1/auth/refresh:
    post:
      summary: Exchange a refresh token for a fresh access + refresh pair.
      tags: [Auth]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              description: |
                Provide `refresh_token` in the body, OR include the
                `phlex_hub_refresh` cookie.
      responses:
        '200':
          description: Fresh tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: No refresh token provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Refresh token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me:
    get:
      summary: Return the authenticated user record and decoded claims.
      tags: [Auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserRecord'
                  claims:
                    $ref: '#/components/schemas/JwtClaims'
        '401':
          description: No / invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: phlex_hub_token

  schemas:
    SignupRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: Username OR email — the hub looks up both.
        email:
          type: string
          format: email
        password:
          type: string
      description: Exactly one of `username` or `email` is required, plus `password`.

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: Signed JWT — round-trips through `Phlex\Shared\Auth\JwtClaims::fromPayload()`.
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/UserRecord'
        claims:
          $ref: '#/components/schemas/JwtClaims'

    UserRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        is_admin:
          type: integer
          enum: [0, 1]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JwtClaims:
      description: |
        Decoded JWT payload shape — matches `Phlex\Shared\Auth\JwtClaims::toPayload()`.
      type: object
      properties:
        iss:
          type: string
          example: phlex-hub
        aud:
          type: string
          example: hub
        sub:
          type: string
          format: uuid
        iat:
          type: integer
        exp:
          type: integer
        type:
          type: string
          enum: [access, refresh]
        nbf:
          type: integer
          nullable: true
        jti:
          type: string
          nullable: true
        scope:
          type: array
          items:
            type: string
        serverId:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
        message:
          type: string
        code:
          type: string
          example: auth.required
